<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aşkın Tatlı Kapışması ❤️</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #ffe4e1; overflow: hidden; }
        #overlay { position: fixed; inset: 0; background: rgba(255,192,203,0.95); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .step { display: none; text-align: center; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .active { display: block; }
        button { padding: 15px 30px; margin: 10px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 18px; }
        input { padding: 15px; margin: 10px; width: 250px; border-radius: 10px; border: 1px solid #ddd; display: block; }
        #chat-btn { position: fixed; bottom: 20px; right: 20px; background: #ff69b4; color: white; width: 60px; height: 60px; border-radius: 50%; font-size: 24px; }
        #chat-input-area { position: fixed; bottom: 90px; right: 20px; display: none; }
        #game-info { position: fixed; top: 10px; left: 10px; color: #d02090; font-weight: bold; }
        #win-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.8); color: white; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; text-align: center; }
    </style>
</head>
<body>
    <div id="overlay">
        <!-- 1. Adım: Karakter Seçimi -->
        <div id="step1" class="step active">
            <h1 style="color: #ff1493;">Aşkın Tatlı Kapışması</h1>
            <button onclick="pickRole('Hakkı')" style="background: #4d94ff; color: white;">Hakkı</button>
            <button onclick="pickRole('Ceylan')" style="background: #ff4d4d; color: white;">Ceylan</button>
        </div>
        <!-- 2. Adım: Detaylar -->
        <div id="step2" class="step">
            <h2 id="role-title"></h2>
            <p>Kalbinin Rengini Seç:</p>
            <input type="color" id="hColor" value="#ff0000" style="width: 100px; height: 50px;">
            <input type="text" id="betInput" placeholder="Neyine oynuyoruz?">
            <div id="ceylan-only" style="display: none;">
                <input type="number" id="limitInput" placeholder="Ölüm sınırı?" value="10">
            </div>
            <button onclick="finishSetup()" style="background: #32cd32; color: white;">BAŞLA</button>
        </div>
    </div>

    <div id="win-screen">
        <h1 id="win-text"></h1>
        <button onclick="requestRestart()" style="background: #ff1493; color: white;">TEKRAR OYNA</button>
    </div>

    <div id="game-info"></div>
    <button id="chat-btn" onclick="toggleChat()">💬</button>
    <div id="chat-input-area">
        <input type="text" id="cMsg" placeholder="Mesaj yaz..." onkeypress="sendChat(event)">
    </div>

    <div id="ask-btn-area" style="position: fixed; top: 10px; right: 10px; display: none;">
        <button id="askBtn" onclick="toggleAsk()" style="background: #ff69b4; color: white;">Aşk Modu: AÇIK</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let myRole = ""; let askActive = true;

        function pickRole(r) {
            myRole = r;
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
            document.getElementById('role-title').innerText = "Hoş geldin " + r;
            if(r === 'Ceylan') document.getElementById('ceylan-only').style.display = 'block';
            if(r === 'Hakkı') document.getElementById('ask-btn-area').style.display = 'block';
        }

        function finishSetup() {
            socket.emit('join', {
                role: myRole,
                bet: document.getElementById('betInput').value,
                limit: document.getElementById('limitInput').value,
                heartColor: document.getElementById('hColor').value
            });
            document.getElementById('overlay').style.display = 'none';
        }

        function toggleAsk() {
            askActive = !askActive;
            socket.emit('toggleAskModu', askActive);
            document.getElementById('askBtn').innerText = "Aşk Modu: " + (askActive ? "AÇIK" : "KAPALI");
            document.getElementById('askBtn').style.background = askActive ? "#ff69b4" : "#555";
        }

        function toggleChat() {
            const area = document.getElementById('chat-input-area');
            area.style.display = area.style.display === 'none' ? 'block' : 'none';
        }

        function sendChat(e) {
            if(e.key === 'Enter') {
                socket.emit('chat', e.target.value);
                e.target.value = "";
                toggleChat();
            }
        }

        function requestRestart() { socket.emit('restartRequest'); }

        socket.on('resetClient', () => { location.reload(); });
        socket.on('gameOver', (text) => {
            document.getElementById('win-screen').style.display = 'flex';
            document.getElementById('win-text').innerHTML = text;
        });

        socket.on('gameState', (data) => {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            ctx.clearRect(0,0,canvas.width, canvas.height);
            
            // Borular yerine Kalpler
            data.pipes.forEach(p => {
                drawHeart(ctx, p.x, p.top, 40, "#ff69b4");
            });

            for (let id in data.players) {
                let p = data.players[id];
                drawHeart(ctx, 100, p.y, 40, p.heartColor);
                ctx.fillStyle = "black"; ctx.font = "16px Arial";
                ctx.fillText(p.role + " (" + p.deaths + ")", 90, p.y - 10);
            }
        });

        function drawHeart(ctx, x, y, size, color) {
            ctx.fillStyle = color; ctx.beginPath();
            ctx.moveTo(x, y + size/4); ctx.quadraticCurveTo(x, y, x + size/4, y);
            ctx.quadraticCurveTo(x + size/2, y, x + size/2, y + size/4);
            ctx.quadraticCurveTo(x + size/2, y, x + size*3/4, y);
            ctx.quadraticCurveTo(x + size, y, x + size, y + size/4);
            ctx.quadraticCurveTo(x + size, y + size/2, x + size/2, y + size*3/4);
            ctx.quadraticCurveTo(x, y + size/2, x, y + size/4); ctx.fill();
        }

        window.addEventListener('keydown', (e) => { if(e.code === 'Space') socket.emit('jump'); });
        window.addEventListener('touchstart', () => socket.emit('jump'));
    </script>
</body>
</html>
