<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>İddialı Bird</title>
    <style>
        body { margin: 0; background: #222; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        canvas { border: 2px solid #555; background: #70c5ce; margin-top: 10px; }
        #login { position: absolute; background: rgba(0,0,0,0.9); width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        input { padding: 12px; margin: 8px; width: 250px; border-radius: 8px; border: none; font-size: 16px; }
        button { padding: 12px 30px; cursor: pointer; background: #e67e22; color: white; border: none; border-radius: 8px; font-weight: bold; }
        #overlay { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; pointer-events: none; min-width: 150px; }
    </style>
</head>
<body>
    <div id="login">
        <h1>Bird İddia Ekranı</h1>
        <input type="text" id="nick" placeholder="Adın / Rolün">
        <input type="text" id="bet" placeholder="Neyine oynuyorsun?">
        <button onclick="joinGame()">OYUNA KATIL</button>
    </div>
    
    <div id="overlay">
        <strong>🏆 Rekabet Panosu</strong>
        <div id="bet-list" style="margin-top:10px;"></div>
    </div>
    
    <canvas id="gameCanvas" width="600" height="600"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
