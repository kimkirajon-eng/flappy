<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aşkın Tatlı Kapışması ❤️</title>
    <style>
        body { margin: 0; font-family: 'Arial'; background: #ffc0cb; overflow: hidden; }
        #overlay { position: fixed; inset: 0; background: #fff0f5; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .step { display: none; text-align: center; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .active { display: block; }
        button { padding: 12px 25px; margin: 5px; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
        input { padding: 10px; margin: 5px; border-radius: 10px; border: 1px solid #ddd; }
        #win-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.9); color: white; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; text-align: center; }
        #chat-ui { position: fixed; bottom: 10px; right: 10px; z-index: 50; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="overlay">
        <div id="step1" class="step active">
            <h1 style="color: #ff69b4;">Aşkın Tatlı Kapışması ❤️</h1>
            <button onclick="pickRole('Hakkı')" style="background: #4d94ff; color: white;">Hakkı</button>
            <button onclick="pickRole('Ceylan')" style="background: #ff4d4d; color: white;">Ceylan</button>
        </div>
        <div id="step2" class="step">
            <h2 id="role-title"></h2>
            <input type="text" id="betInput" placeholder="Neyine oynuyoruz?">
            <p>Kalbinin Rengi:</p>
            <input type="color" id="hColor" value="#ff0000">
            <div id="h-extras" style="display: none; margin-top: 15px;">
                <label style="color: #d02090; font-weight: bold;">
                    <input type="checkbox" id="askCheck" checked> Aşk Modu (Ceylan Hep Kazansıın)
                </label>
            </div>
            <div id="c-extras" style="display: none; margin-top: 15px;">
                Ölüm Sınırı: <input type="number" id="limitInput" value="10" style="width: 60px;">
            </div>
            <br><button onclick="finishSetup()" style="background: #32cd32; color: white; margin-top: 15px;">BAŞLA!</button>
        </div>
    </div>

    <div id="win-screen">
        <h1 id="win-text"></h1>
        <button onclick="socket.emit('restartRequest')" style="background: #ff1493; color: white;">TEKRAR OYNA</button>
    </div>

    <div id="chat-ui">
        <div id="msgs" style="height: 60px; color: white; text-shadow: 1px 1px 2px black;"></div>
        <button onclick="toggleChatIn()">💬 Mesaj</button>
        <input type="text" id="chatIn" style="display: none;" onkeypress="sendChat(event)">
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
