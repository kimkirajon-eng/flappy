<!DOCTYPE html>
<html>
<head>
    <title>Multiplayer Bet Bird</title>
    <style>
        body { margin: 0; background: #222; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        canvas { border: 2px solid #555; background: #70c5ce; margin-top: 10px; }
        #login { position: absolute; background: rgba(0,0,0,0.8); width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        input { padding: 10px; margin: 5px; width: 200px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; }
        #bet-overlay { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="login">
        <h1>Multiplayer Bird</h1>
        <input type="text" id="nick" placeholder="Adın">
        <input type="text" id="bet" placeholder="Neyine oynuyorsun?">
        <button onclick="joinGame()">Başla!</button>
    </div>
    
    <div id="bet-overlay">
        <strong>Mevcut İddialar:</strong>
        <div id="bet-list"></div>
    </div>
    
    <canvas id="gameCanvas" width="600" height="600"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
